profile_name: blue_origin_new_glenn
description: Default New Glenn telemetry profile derived from BlueOrigin_NG-3.mp4.
default_sample_fps: 0.5
fixture_frame_count: 20
fixture_time_range_s: [0.0, 840.0]
video_overlay:
  enabled: true
  plot_mode: filtered
  width_fraction: 0.5
  height_fraction: 0.65
  output_filename: telemetry_overlay.mp4
  include_audio: true
trajectory:
  enabled: true
  interpolation_method: pchip
  integration_method: rk4
  outlier_preconditioning_enabled: true
  coarse_step_smoothing_enabled: true
  coarse_step_max_gap_s: 10.0
  coarse_altitude_threshold_m: 500.0
  coarse_velocity_threshold_mps: 50.0
  acceleration_source_gap_threshold_s: 10.0
  derivative_smoothing_window_s: 20.0
  derivative_smoothing_polyorder: 3
  derivative_min_window_samples: 5
  derivative_smoothing_mode: interp
  launch_site:
    latitude_deg: 28.47056
    longitude_deg: -80.54
    azimuth_deg: 107.4
parsing:
  velocity:
    default_unit: MPH
    units:
      MPH:
        aliases:
        - MPH
        - MPN
        - "M\u0420\u041D"
        - MPI
        - M/H
        si_factor: 0.44704
      KPH:
        aliases:
        - KPH
        - KMH
        - KM/H
        - KMPH
        si_factor: 0.2777777777777778
      MPS:
        aliases:
        - M/S
        - MPS
        - MS
        si_factor: 1.0
    inferred_units_with_separator:
    - MPH
    inferred_units_without_separator:
    - MPH
  altitude:
    default_unit: FT
    units:
      FT:
        aliases:
        - FT
        - F7
        - FI
        - ET
        - E7
        - EI
        si_factor: 0.3048
      MI:
        aliases:
        - MI
        - ML
        - M1
        si_factor: 1609.344
      KM:
        aliases:
        - KM
        si_factor: 1000.0
      M:
        aliases:
        - M
        si_factor: 1.0
    inferred_units_with_separator:
    - FT
    - MI
    inferred_units_without_separator:
    - FT
    ambiguous_default_unit: FT
  met:
    timestamp_patterns:
    - T\s*([+-])?\s*(\d{2})(?::(\d{2}))(?::(\d{2}))?
    - ([+-])?\s*(\d{2})(?::(\d{2}))(?::(\d{2}))?
  custom_words:
  - STAGE
  - VELOCITY
  - ALTITUDE
  - T+
  - T-
  - MPH
  - MPN
  - "M\u0420\u041D"
  - MPI
  - M/H
  - KPH
  - KMH
  - KM/H
  - KMPH
  - M/S
  - MPS
  - MS
  - FT
  - F7
  - FI
  - ET
  - E7
  - EI
  - MI
  - ML
  - M1
  - KM
  - M
hardcoded_raw_data_points:
- mission_elapsed_time_s: 560.0
  stage1:
    velocity_mps: 0.0
    altitude_m: 0.0
fields:
  stage1_velocity:
    kind: velocity
    stage: stage1
    bbox_x1y1x2y2: [0.12291666666666666, 0.9027777777777778, 0.23333333333333334, 0.9574074074074074]
  stage1_altitude:
    kind: altitude
    stage: stage1
    bbox_x1y1x2y2: [0.28541666666666665, 0.9046296296296297, 0.40208333333333335, 0.9546296296296296]
  met:
    kind: met
    stage: null
    bbox_x1y1x2y2: [0.41458333333333336, 0.8861111111111111, 0.5963541666666666, 0.975]
  stage2_velocity:
    kind: velocity
    stage: stage2
    bbox_x1y1x2y2: [0.6453125, 0.8981481481481481, 0.75625, 0.9648148148148148]
  stage2_altitude:
    kind: altitude
    stage: stage2
    bbox_x1y1x2y2: [0.8041666666666667, 0.8962962962962963, 0.909375, 0.9537037037037037]
